kind = "web"
previewPath = "/"
title = "DocTrackr"
version = "1.0.0"
id = "artifacts/doctrackr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19867

[services.development]
run = "pnpm --filter @workspace/doctrackr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/doctrackr", "run", "build" ]
publicDir = "artifacts/doctrackr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19867"
BASE_PATH = "/"
