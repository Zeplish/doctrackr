services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-doctrackr}
      POSTGRES_USER: ${POSTGRES_USER:-doctrackr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doctrackr} -d ${POSTGRES_DB:-doctrackr}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-doctrackr}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-doctrackr}
      SESSION_SECRET: ${SESSION_SECRET:-please-change-this-secret}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-changeme}
      NODE_ENV: production
      PORT: 8080

  frontend:
    build:
      context: .
      dockerfile: artifacts/doctrackr/Dockerfile
    restart: unless-stopped
    depends_on:
      - api

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "${EXPOSE_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
